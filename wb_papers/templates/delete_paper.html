{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden text-center">
                <div class="bg-danger py-4 text-white">
                    <i class="bi bi-exclamation-octagon display-4"></i>
                </div>
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold text-dark">Confirm Deletion</h4>
                    <p class="text-muted">Are you sure you want to delete <strong>"{{ paper.title }}"</strong>? This action cannot be undone.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-danger py-3 fw-bold rounded-3 shadow-sm">
                                <i class="bi bi-trash3 me-2"></i> Yes, Delete Permanently
                            </button>
                            <a href="{% url 'edit_paper' paper.pk %}" class="btn btn-light py-2 text-secondary">
                                Cancel and Go Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
