{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.2">
    <title>PaperVault WB</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">
            Academic Archive
        </a>
        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white me-3 small">Hello, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm px-4">Sign In</a>
            {% endif %}
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer class="py-5 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 PaperVault WB. All rights reserved.</p>
        <div class="mt-2">
            <small class="opacity-75 text-white">Verified Faculty Repository</small>
        </div>
    </div>
</footer>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
